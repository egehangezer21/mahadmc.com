<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Market - ElMahadMc</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
background:#0b1220;
color:white;
text-align:center;
}

/* HEADER */
h1{
margin-top:50px;
color:gold;
}

/* BALANCE */
.balance{
margin-top:10px;
font-size:18px;
color:#4ade80;
}

/* CARDS */
.container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
margin-top:30px;
}

.card{
width:240px;
background:rgba(255,255,255,0.06);
padding:20px;
border-radius:12px;
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 0 15px gold;
}

.price{
color:gold;
margin:10px 0;
font-size:18px;
}

.btn{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.buy{
background:gold;
color:black;
}

.topup{
background:#4ade80;
color:black;
margin-top:20px;
}

/* FORM */
.form{
margin-top:40px;
display:inline-block;
padding:20px;
background:rgba(255,255,255,0.05);
border-radius:12px;
}

input{
display:block;
margin:10px 0;
padding:10px;
width:220px;
border-radius:8px;
border:none;
}
</style>

</head>

<body>

<h1>💎 VIP MARKET</h1>

<div class="balance">
💰 Bakiye: <span id="bal">0</span> TL
</div>

<button class="btn topup" onclick="addMoney()">+ 100 TL Yükle (Demo)</button>

<div class="container">

<div class="card">
<h3>VIP</h3>
<p>Renkli isim</p>
<div class="price">50 TL</div>
<button class="btn buy" onclick="buy('VIP',50)">Satın Al</button>
</div>

<div class="card">
<h3>VIP+</h3>
<p>Fly + kit</p>
<div class="price">100 TL</div>
<button class="btn buy" onclick="buy('VIP+',100)">Satın Al</button>
</div>

<div class="card">
<h3>ELITE</h3>
<p>Tüm özellikler</p>
<div class="price">200 TL</div>
<button class="btn buy" onclick="buy('ELITE',200)">Satın Al</button>
</div>

</div>

<div class="form">
<h3>Sipariş Bilgisi</h3>

<input id="nick" placeholder="Minecraft Nick">
<input id="contact" placeholder="Discord / Mail">

<p id="msg"></p>
</div>

<script>
let balance = localStorage.getItem("balance") || 0;
document.getElementById("bal").innerText = balance;

function save(){
localStorage.setItem("balance", balance);
document.getElementById("bal").innerText = balance;
}

function addMoney(){
balance = Number(balance) + 100;
save();
alert("100 TL eklendi (demo)");
}

function buy(rank, price){

let nick = document.getElementById("nick").value;
let contact = document.getElementById("contact").value;

if(!nick || !contact){
alert("Nick ve iletişim gir!");
return;
}

if(balance < price){
alert("Yetersiz bakiye!");
return;
}

balance -= price;
save();

document.getElementById("msg").innerText =
"✅ " + rank + " satın alındı! (" + nick + ")";

alert("Satın alma başarılı! Discord'a bildirim gönderilebilir.");
}
</script>

</body>
</html>
